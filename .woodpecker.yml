when:
  - event: [push, pull_request, manual]
steps:
  verify:
    image: node:22-alpine
    commands:
      - npm ci
      - npm audit --audit-level=high
      - npm run check
      - npm run typecheck
      - npm run build
  e2e:
    image: mcr.microsoft.com/playwright:v1.55.0-noble
    commands:
      - npm ci
      - npx playwright install chromium firefox
      - npm run test:e2e
  performance:
    image: mcr.microsoft.com/playwright:v1.55.0-noble
    commands:
      - npm ci
      - npx playwright install chromium
      - npm run build
      - npm run size:check
      - npm run lighthouse:ci
  deploy:
    image: node:22-alpine
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache git
      - npm ci
      - npm run deploy
    when:
      - event: push
        branch: main
  renovate:
    image: renovate/renovate:43
    environment:
      RENOVATE_PLATFORM: gitea
      RENOVATE_ENDPOINT: https://codeberg.org/api/v1
      RENOVATE_TOKEN:
        from_secret: codeberg_token
      RENOVATE_REPOSITORIES: annazez/pages
      RENOVATE_GIT_AUTHOR: 'Renovate Bot <anna.zezulka@proton.me>'
      LOG_LEVEL: info
    when:
      - event: cron
        cron: renovate_bot
